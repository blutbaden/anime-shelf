services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animeshelf-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - animeshelf

  nginx:
    image: nginx:1.25-alpine
    container_name: animeshelf-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - animeshelf

  db:
    image: postgres:16-alpine
    container_name: animeshelf-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: animeshelf-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - animeshelf_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - animeshelf

  redis:
    image: redis:7-alpine
    container_name: animeshelf-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - animeshelf

volumes:
  animeshelf_db_data:

networks:
  animeshelf:
    driver: bridge
