services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animeshelf-app
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - animeshelf

  nginx:
    image: nginx:1.25-alpine
    container_name: animeshelf-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - app_storage:/var/www/html/storage/app/public:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - animeshelf

  db:
    image: postgres:16-alpine
    container_name: animeshelf-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - animeshelf_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - animeshelf

  redis:
    image: redis:7-alpine
    container_name: animeshelf-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - animeshelf_redis_data:/data
    networks:
      - animeshelf

volumes:
  animeshelf_db_data:
  animeshelf_redis_data:
  app_storage:
  app_logs:

networks:
  animeshelf:
    driver: bridge
